<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Deteksi Rambu Lalu Lintas - YOLOv8</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🚦 Deteksi Rambu Lalu Lintas</h1>
  <p>Optimisasi deteksi menggunakan YOLOv8</p>

  <input type="file" id="upload" accept="image/*" />
  <br />
  <button onclick="deteksi()">Deteksi Rambu</button>

  <div id="preview-container">
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div id="hasil">
    <h2>Hasil Deteksi</h2>
    <ul id="hasil-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
