<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Rambu Lalu Lintas dengan YOLO (TensorFlow.js)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Deteksi Rambu Lalu Lintas</h1>

        <div class="input-section">
            <input type="file" id="imageUpload" accept="image/*">
            <button id="detectButton" disabled>Deteksi Rambu</button>
            <p>Pilih gambar rambu lalu lintas untuk dideteksi.</p>
        </div>

        <div class="loading" id="loadingMessage">
            Memuat model... Harap tunggu.
        </div>

        <div class="image-display">
            <canvas id="detectionCanvas"></canvas>
            <img id="inputImage" style="display: none;">
        </div>

        <div class="results-section">
            <h2>Hasil Deteksi</h2>
            <div id="detectionResults" class="results-box">
                <p>Tidak ada deteksi.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
